<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Typing Speed Test</h1>
        <p>Type the paragraph below as quickly and accurately as you can:</p>
        <form action="/submit_test" method="POST">
            <div class="sentence-display">
                <p id="sentence">{{ sentence }}</p>
                <input type="hidden" name="sentence" value="{{ sentence }}">
                <input type="hidden" name="start_time" id="start-time">
            </div>
            <div id="countdown">Starting in {{ timer_duration }}...</div>
            <textarea name="user_input" id="user-input" placeholder="Start typing here..." disabled required></textarea>
            <br><br>
            <button type="submit" id="submit-btn">Submit</button>
        </form>
        {% if elapsed_time is defined %}
        <div id="results">
            <h2>Results:</h2>
            <p><strong>Time Taken:</strong> {{ elapsed_time }} seconds</p>
            <p><strong>Words Per Minute:</strong> {{ wpm }}</p>
            <p><strong>Accuracy:</strong> {{ accuracy }}%</p>
        </div>
        {% endif %}
    </div>

    <script>
        let countdown = {{ timer_duration }};
        const countdownEl = document.getElementById('countdown');
        const textarea = document.getElementById('user-input');
        const startTimeInput = document.getElementById('start-time');

        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = `Starting in ${countdown}...`;
            if (countdown === 0) {
                clearInterval(timer);
                countdownEl.textContent = "Go!";
                textarea.disabled = false;
                startTimeInput.value = Date.now() / 1000; // Record start time
            }
        }, 1000);
    </script>
</body>
</html>
